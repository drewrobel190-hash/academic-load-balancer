<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics | Academic Load Balancer</title>
  <link rel="stylesheet" href="CSS/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="app-page">
<div class="dashboard">

  <header class="mobile-topbar">
    <button class="menu-toggle" id="menuToggle" aria-label="Open navigation">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <a href="dashboard.html" class="mobile-brand">
      <span class="brand-icon" style="width:26px;height:26px;border-radius:6px">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </span>
      ALB System
    </a>
  </header>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <a class="brand" href="dashboard.html">
      <span class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </span>
      ALB System
    </a>
    <nav aria-label="Primary navigation">
      <ul>
        <li><a href="dashboard.html">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a></li>
        <li><a href="tasks.html">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg>
          Tasks
        </a></li>
        <li><a href="analytics.html" aria-current="page">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Analytics
        </a></li>
        <li><a href="dashboard.html#calendar">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Calendar
        </a></li>
        <li><a href="profile.html">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile
        </a></li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <a href="profile.html" class="sidebar-user-link">
        <span class="sidebar-avatar" id="sidebarAvatar">?</span>
        <span class="sidebar-user-info">
          <span id="sidebarEmail">Loading…</span>
          <span id="sidebarRole">—</span>
        </span>
      </a>
      <div class="sidebar-footer-actions">
        <button type="button" id="darkModeToggle" class="sidebar-icon-btn" aria-label="Toggle dark mode" title="Toggle dark mode">
          <svg id="darkModeIcon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button type="button" id="logoutBtn" class="sidebar-icon-btn" aria-label="Log out" title="Log out">
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <p class="eyebrow">Insights</p>
        <h1>Academic Analytics</h1>
      </div>
      <div class="header-actions">
        <button type="button" id="exportBtn" class="primary-button">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export PDF
        </button>
      </div>
    </header>

    <div id="analyticsStats" class="analytics-stats"></div>

    <section class="panel chart-container" aria-labelledby="subjectChartTitle">
      <div class="section-heading">
        <h2 id="subjectChartTitle">Workload by Subject</h2>
      </div>
      <p id="subjectChartMessage" class="chart-message">No subject workload data yet.</p>
      <canvas id="subjectChart" class="is-hidden"></canvas>
    </section>

    <section class="panel chart-container" aria-labelledby="workloadPieChartTitle">
      <div class="section-heading">
        <h2 id="workloadPieChartTitle">Task Type Distribution</h2>
      </div>
      <p id="workloadPieChartMessage" class="chart-message">No workload distribution data yet.</p>
      <canvas id="workloadPieChart" class="is-hidden"></canvas>
    </section>
  </main>

</div>
<div id="toast"></div>
<script type="module" src="js/analytics.js"></script>
</body>
</html>
